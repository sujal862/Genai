services:  # "Hey Docker, here are the containers to run"
  ollama:  # Name of our container
    image: ollama/ollama:latest # download this image(class) from docker hub
    ports: 
      - '11434:11434'  # windows port : ollama container port
    volumes:
      - models:/root/.ollama/models

volumes:
  models: #  Create a storage space called "models"  ( docker-compose down karte hi container(object) ka sara data delete hojata hai for ex: gemma3 model jo tuna pull kiya hai 2gb ka wo delte hojyga , so we use volume so that gemma3model(data of object(continer)) kal din agr hum phir sa ak nya object(container) banaka usko run kra to , gemma3 model pulll krta sma ya redownload na ho purana hi sa sync krla 



### What is VOLUME? 📦

# Problem without Volume:
# ┌─────────────────────┐
# │ Ollama Container    │
# │                     │
# │ Downloaded models   │
# │ inside container    │
# └─────────────────────┘
#          ↓
# You delete/restart container
#          ↓
# ALL MODELS DELETED! 😱
# Download again! 😭
# ```
# ```
# Solution with Volume:
# ┌─────────────────────┐
# │ Ollama Container    │
# │                     │
# │ Models stored in ───┼──→ 📦 Volume "models"
# │ /root/.ollama/models│      (stored safely
# └─────────────────────┘       outside container
#                                on your SSD!)
#          ↓
# You delete/restart container
#          ↓
# Models are SAFE in Volume! ✅
# No need to download again! 😊



# cmnd : docker compose up : Docker downloads Ollama image , Creates container, Starts Ollama server